name: CI - Frontend Nginx Container

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # AI generated v3, but they are on v6: https://github.com/actions/checkout

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # AI generated v3, they are on v4: https://github.com/docker/setup-buildx-action

      - name: Build Docker image
        run: docker build -t frontend-app ./frontend

      - name: Run container in background
        run: docker run -d --rm -p 8080:80 --name frontend-app-container frontend-app

      - name: Wait for Nginx to be ready
        run: |
          for i in {1..5}; do
            if curl -s http://localhost:8080 | grep -q 'Hello from the frontend'; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time" && exit 1

      - name: Stop container
        if: always()
        run: docker stop frontend-app-container
